<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Deal Shopee</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

.header{
background:#ee4d2d;
color:white;
padding:15px;
font-size:22px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

img{
width:100%;
border-radius:6px;
}

.price{
color:red;
font-weight:bold;
}

button{
background:#ee4d2d;
border:none;
color:white;
padding:8px 12px;
border-radius:5px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
🔥 Deal Shopee hôm nay
</div>

<div class="products">

<div class="card">

<img src="https://cf.shopee.vn/file/4e9c3d9d3c2b0f">

<p>Tai nghe Bluetooth</p>

<p class="price">59.000₫</p>

<a href="https://shopee.vn/" target="_blank">
<button>Mua ngay</button>
</a>

</div>


<div class="card">

<img src="https://cf.shopee.vn/file/2e03b7c1e4c4e">

<p>Sạc nhanh 65W</p>

<p class="price">129.000₫</p>

<a href="https://shopee.vn/" target="_blank">
<button>Mua ngay</button>
</a>

</div>


<div class="card">

<img src="https://cf.shopee.vn/file/59f0e8a32f4">

<p>Chuột gaming RGB</p>

<p class="price">79.000₫</p>

<a href="https://shopee.vn/" target="_blank">
<button>Mua ngay</button>
</a>

</div>

</div>

</body>
</html>
