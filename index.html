<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Deal Shopee</title>

<style>
body{font-family:Arial;background:#f5f5f5;margin:0;}
.header{background:#ee4d2d;color:white;padding:15px;font-size:22px;}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
position:relative;
min-height:260px;
}

img{width:100%;border-radius:6px;}

.price{color:red;font-weight:bold;}

.buttons{
position:absolute;
top:10px;
left:10px;
right:10px;
bottom:10px;
pointer-events:none;
}

.buttons button{
position:absolute;
pointer-events:auto;
padding:6px 8px;
border:none;
border-radius:4px;
background:#eee;
cursor:pointer;
font-size:11px;
}

/* modal */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

.modal-box{
background:white;
padding:20px;
border-radius:8px;
max-width:300px;
text-align:center;
}

.modal button{
margin-top:10px;
padding:8px 12px;
border:none;
background:#ee4d2d;
color:white;
border-radius:4px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">🔥 Deal Shopee hôm nay</div>

<div class="products">

<div class="card">

<img src="https://cf.shopee.vn/file/4e9c3d9d3c2b0f">
<p>Tai nghe Bluetooth</p>
<p class="price">59.000₫</p>

<a href="https://shopee.vn/" target="_blank">
<button>Mua ngay</button>
</a>

<div class="buttons" id="btn-area"></div>

</div>

</div>

<div class="modal" id="modal">
<div class="modal-box">
<p>Chi tiết deal hoặc thông báo khuyến mãi</p>
<button onclick="closeModal()">Đóng</button>
</div>
</div>

<script>

const area=document.getElementById("btn-area")

for(let i=0;i<16;i++){

let btn=document.createElement("button")
btn.innerText="★"

btn.style.top=Math.random()*200+"px"
btn.style.left=Math.random()*150+"px"

btn.onclick=()=>openModal()

area.appendChild(btn)

}

function openModal(){
document.getElementById("modal").style.display="flex"
}

function closeModal(){
document.getElementById("modal").style.display="none"
}

</script>

</body>
</html>
