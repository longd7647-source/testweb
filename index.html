<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flash Sale Shopee</title>
</head>

<body>

<h1>Sản phẩm Flash Sale Shopee</h1>

<div id="products">Đang tải...</div>

<script>

fetch("https://corsproxy.io/?https://shopee.vn/api/v4/flash_sale/get_flash_sale")
.then(res => res.json())
.then(data => {

console.log(data)

let html = ""

if(!data.data || !data.data.sessions){
document.getElementById("products").innerHTML = "Không lấy được dữ liệu"
return
}

data.data.sessions.forEach(session => {

session.items.forEach(item => {

let itemid = item.itemid
let shopid = item.shopid

let link = "https://shopee.vn/product/" + shopid + "/" + itemid

html += `
<div style="margin:10px;padding:10px;border:1px solid #ccc">
<a href="${link}" target="_blank">
Xem sản phẩm ${itemid}
</a>
</div>
`

})

})

document.getElementById("products").innerHTML = html

})
.catch(err=>{
console.error(err)
document.getElementById("products").innerHTML = "Lỗi khi lấy dữ liệu"
})

</script>

</body>
</html>
