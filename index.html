<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flash Sale Shopee</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 0 5px rgba(0,0,0,0.1);
}

img{
width:100%;
}

.price{
color:red;
font-weight:bold;
}

</style>

</head>

<body>

<h1>Sản phẩm Flash Sale Shopee</h1>

<div class="products" id="products"></div>

<script>

fetch("https://shopee.vn/api/v4/search/search_items?by=ctime&limit=20&newest=0&order=desc&page_type=search")
.then(res=>res.json())
.then(data=>{

let html=""

data.items.forEach(item=>{

let name=item.item_basic.name
let image=item.item_basic.image
let price=item.item_basic.price/100000

let link=`https://shopee.vn/product/${item.item_basic.shopid}/${item.item_basic.itemid}`

html+=`
<div class="card">

<img src="https://cf.shopee.vn/file/${image}">

<p>${name}</p>

<p class="price">${price}₫</p>

<a href="${link}" target="_blank">Xem sản phẩm</a>

</div>
`

})

document.getElementById("products").innerHTML=html

})

</script>

</body>
</html>
